<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lyric Video — Metal Slug</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated}
  html,body{width:100%;height:100%;overflow:hidden;background:#1a0e00}

  /* ── SKY ── */
  #sky{
    position:fixed;inset:0;z-index:0;
    background:linear-gradient(180deg,#4a2800 0%,#7a3800 35%,#b05a00 65%,#d4820a 100%);
  }
  /* Sun */
  #sky::before{
    content:'';position:absolute;
    width:80px;height:80px;
    background:#ffcc00;
    border-radius:50%;
    top:10%;right:15%;
    box-shadow:0 0 40px 20px rgba(255,200,0,0.4);
  }

  /* ── Mountains BG ── */
  .mountain{
    position:fixed;bottom:120px;z-index:1;
    background:#2d1a00;
  }

  /* ── Ground layers ── */
  #ground-far{
    position:fixed;bottom:100px;left:0;right:0;height:30px;z-index:2;
    background:#59380a;
    border-top:4px solid #7c5218;
  }
  #ground-mid{
    position:fixed;bottom:70px;left:0;right:0;height:35px;z-index:3;
    background:#3d2200;
    border-top:4px solid #5a3300;
  }
  #ground{
    position:fixed;bottom:0;left:0;right:0;height:72px;z-index:4;
    background:#2a1500;
    border-top:6px solid #3d2200;
  }
  #ground::before{
    content:'';position:absolute;top:0;left:0;right:0;height:6px;
    background:repeating-linear-gradient(90deg,#4a2a00 0,#4a2a00 16px,#3d2200 16px,#3d2200 32px);
  }

  /* ── Ruins / Columns ── */
  .ruin{
    position:fixed;bottom:68px;z-index:3;
    background:#1a0d00;
    border-left:3px solid #2e1800;border-right:3px solid #2e1800;
  }
  .ruin::before{
    content:'';position:absolute;top:-12px;left:-6px;right:-6px;height:12px;
    background:#1a0d00;
    border:3px solid #2e1800;
    border-bottom:none;
  }

  /* ── Tank (CSS pixel art) ── */
  #tank{
    position:fixed;bottom:68px;left:8%;z-index:10;
    transform-origin:left bottom;
  }
  .tank-body{
    width:100px;height:40px;background:#5c7a2e;
    border:3px solid #3d5220;
    position:relative;
  }
  .tank-body::before{/* turret */
    content:'';position:absolute;
    top:-22px;left:20px;
    width:50px;height:20px;background:#4a6424;
    border:3px solid #3d5220;
  }
  .tank-barrel{
    position:absolute;top:-18px;left:56px;
    width:44px;height:8px;background:#3d5220;
    border:2px solid #2a3a14;
    transform-origin:left center;
  }
  .tank-track{
    width:112px;height:16px;background:#2a1800;
    border:3px solid #3d2800;margin-top:0;margin-left:-6px;
    background:repeating-linear-gradient(90deg,#2a1800 0,#2a1800 10px,#1a1000 10px,#1a1000 20px);
  }
  /* Cannon fire */
  .muzzle-flash{
    position:absolute;top:-24px;left:88px;
    width:20px;height:12px;
    background:#ffaa00;
    clip-path:polygon(0 50%,40% 0,100% 50%,40% 100%);
    opacity:0;z-index:11;
  }

  /* ── Helicopter ── */
  #heli{
    position:fixed;top:12%;left:-200px;z-index:8;
  }
  .heli-body{
    width:80px;height:32px;background:#4a5e1e;
    border:3px solid #323e14;border-radius:4px;
    position:relative;
  }
  .heli-tail{
    position:absolute;right:-40px;top:8px;
    width:40px;height:8px;background:#3d5220;
    border:2px solid #2a3a14;
  }
  .heli-rotor{
    position:absolute;top:-6px;left:10px;
    width:60px;height:6px;background:#5a7a2e;
    border:2px solid #3d5220;
    transform-origin:center;
    animation:rotor 0.08s linear infinite;
  }
  @keyframes rotor{to{transform:rotate(360deg)}}
  .heli-gun{
    position:absolute;bottom:-8px;left:20px;
    width:24px;height:6px;background:#2a3a14;
    border:2px solid #1a2a0a;
  }

  /* ── Explosion CSS ── */
  .explosion{
    position:fixed;z-index:20;
    pointer-events:none;
    width:0;height:0;
    opacity:0;
  }
  .exp-ring{
    position:absolute;
    border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,#fff 0%,#ffff00 20%,#ff6600 50%,rgba(200,50,0,0) 100%);
  }

  /* ── Soldier sprites (CSS box-shadow pixel art) ── */
  .soldier{
    position:fixed;bottom:98px;z-index:9;
    width:8px;height:8px;background:transparent;
  }
  /* soldier-a: running right */
  .sol-a::before,.sol-a::after{content:'';position:absolute;width:8px;height:8px;}
  /* We draw soldiers using a single inline pixel via generated content box-shadow chains */

  /* ── HUD ── */
  #hud{
    position:fixed;top:12px;left:16px;z-index:30;
    color:#ffcc00;font-family:'VT323',monospace;font-size:clamp(1rem,2.5vw,1.5rem);
    line-height:2;
    text-shadow:2px 2px 0 #000;
    opacity:0;
  }

  /* ── Lyric display ── */
  #lyric-wrap{
    position:fixed;
    bottom:clamp(90px,14vh,160px);
    left:50%;transform:translateX(-50%);
    z-index:25;
    width:min(820px,90vw);
    text-align:center;
  }
  #lyric{
    display:inline-block;
    font-family:'Orbitron',sans-serif;
    font-size:clamp(1.8rem,5vw,5rem);
    font-weight:900;
    letter-spacing:0.06em;
    color:#ffee00;
    text-shadow:
      3px 3px 0 #000,
      -2px -2px 0 #000,
      0 0 20px rgba(255,200,0,0.6);
    background:rgba(0,0,0,0.5);
    padding:clamp(8px,1.5vw,20px) clamp(12px,3vw,40px);
    border:3px solid rgba(255,200,0,0.4);
    opacity:0;
    position:relative;
  }
  /* Corner decorations */
  #lyric::before,#lyric::after{
    content:'';position:absolute;
    width:12px;height:12px;
    border-color:#ffee00;border-style:solid;
    opacity:0.6;
  }
  #lyric::before{top:-3px;left:-3px;border-width:3px 0 0 3px;}
  #lyric::after{bottom:-3px;right:-3px;border-width:0 3px 3px 0;}

  /* ── Title screen ── */
  #title-screen{
    position:fixed;inset:0;z-index:60;
    background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  }
  #ts-title{
    font-family:'Orbitron',sans-serif;font-weight:900;
    font-size:clamp(2rem,6vw,5rem);
    color:#ffee00;text-shadow:4px 4px 0 #cc0000;
    text-align:center;padding:0 20px;
    animation:scanline 0.08s step-end infinite alternate;
  }
  @keyframes scanline{0%{opacity:1}100%{opacity:0.9}}
  #ts-sub{
    font-family:'VT323',monospace;font-size:clamp(1.4rem,3vw,2.2rem);
    color:#ff4400;letter-spacing:0.15em;
  }
  #ts-press{
    font-family:'VT323',monospace;font-size:clamp(1rem,2vw,1.5rem);
    color:#aaa;animation:blink2 1s step-end infinite;
  }
  @keyframes blink2{0%,100%{opacity:1}50%{opacity:0}}

  /* ── Smoke particles ── */
  .smoke{
    position:fixed;z-index:6;pointer-events:none;
    border-radius:50%;background:rgba(80,50,20,0.35);
    opacity:0;
  }
</style>
</head>
<body>

<div id="sky"></div>

<!-- mountains -->
<div class="mountain" style="width:200px;height:140px;right:20%;clip-path:polygon(0 100%,50% 0,100% 100%)"></div>
<div class="mountain" style="width:140px;height:100px;right:8%;clip-path:polygon(0 100%,50% 0,100% 100%)"></div>
<div class="mountain" style="width:260px;height:160px;left:0%;clip-path:polygon(0 100%,50% 0,100% 100%)"></div>

<!-- Ruins -->
<div class="ruin" style="width:20px;height:80px;left:42%;"></div>
<div class="ruin" style="width:20px;height:55px;left:44%;"></div>
<div class="ruin" style="width:20px;height:95px;right:30%;"></div>

<!-- Ground layers -->
<div id="ground-far"></div>
<div id="ground-mid"></div>
<div id="ground"></div>

<!-- Helicopter -->
<div id="heli">
  <div class="heli-body">
    <div class="heli-rotor"></div>
    <div class="heli-tail"></div>
    <div class="heli-gun"></div>
  </div>
</div>

<!-- Tank -->
<div id="tank">
  <div class="tank-body">
    <div class="tank-barrel"></div>
    <div class="muzzle-flash" id="mflash"></div>
  </div>
  <div class="tank-track"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div>MISSION 01</div>
  <div id="hud-pts">PTS: <span id="pts">000000</span></div>
  <div id="hud-song" style="font-size:0.85em;color:rgba(255,200,0,0.7)">♪ {{SONG_NAME}}</div>
</div>

<!-- Lyric -->
<div id="lyric-wrap"><div id="lyric"></div></div>

<!-- Title -->
<div id="title-screen">
  <div id="ts-title">{{SONG_NAME}}</div>
  <div id="ts-sub">{{ARTIST_NAME}}</div>
  <div id="ts-press">INSERT COIN ▶ PRESS START</div>
</div>

<script>
const LYRICS = [{{LYRICS_JSON}}];
let idx = 0;
let pts = 0;

const lyricEl = document.getElementById('lyric');
const ptsEl   = document.getElementById('pts');
const mflash  = document.getElementById('mflash');
const heliEl  = document.getElementById('heli');
const tankEl  = document.getElementById('tank');
const hud     = document.getElementById('hud');
const titleSc = document.getElementById('title-screen');

// Animate heli flying across
function flyHeli(){
  gsap.fromTo(heliEl, {left:'-180px'}, {left:'110%', duration:14, ease:'none', repeat:-1, repeatDelay:6});
}
flyHeli();

// Tank slow roll
gsap.to('#tank', {left:'35%', duration:30, ease:'none', repeat:-1, repeatDelay:2});

// Cannon fire on each line
function fireCannon(){
  gsap.fromTo(mflash, {opacity:1,scaleX:1},{opacity:0,scaleX:2,duration:0.15,ease:'power3.out'});
  spawnExplosion(window.innerWidth*0.25, window.innerHeight*0.6);
}

// Explosion
function spawnExplosion(x, y){
  const div = document.createElement('div');
  div.className='explosion';
  div.style.left = x+'px';
  div.style.top  = y+'px';
  document.body.appendChild(div);
  for(let i=0;i<3;i++){
    const ring=document.createElement('div');
    ring.className='exp-ring';
    const size=(i+1)*50 + Math.random()*30;
    ring.style.width=size+'px';ring.style.height=size+'px';
    div.appendChild(ring);
    gsap.fromTo(ring,
      {opacity:1,scale:0},
      {opacity:0,scale:1.5,duration:0.4+i*0.1,delay:i*0.05,ease:'power2.out',
       onComplete:i===2?()=>div.remove():null}
    );
  }
  // smoke puffs
  for(let i=0;i<4;i++){
    const s=document.createElement('div');s.className='smoke';
    const sz=20+Math.random()*30;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${x+(Math.random()-0.5)*60}px;top:${y+(Math.random()-0.5)*40}px`;
    document.body.appendChild(s);
    gsap.fromTo(s,{opacity:0.6,scale:0.5,y:0},{opacity:0,scale:2,y:-60,duration:0.8+Math.random()*0.4,delay:Math.random()*0.2,onComplete:()=>s.remove()});
  }
}

function showLine(text, onDone){
  if(!text||!text.trim()){setTimeout(onDone,600);return;}
  pts += 200;
  ptsEl.textContent = String(pts).padStart(6,'0');
  lyricEl.textContent = text;
  fireCannon();
  const hold = Math.max(1200, text.length * 60);
  gsap.timeline()
    .fromTo(lyricEl,
      {opacity:0, y:20, scaleX:1.2, filter:'blur(4px)'},
      {opacity:1, y:0,  scaleX:1,   filter:'blur(0px)', duration:0.18, ease:'power3.out'}
    )
    .to(lyricEl,
      {opacity:0, y:-15, scaleX:0.9, duration:0.18, ease:'power3.in', delay:hold/1000},
      '+= 0'
    )
    .call(onDone);
}

function next(){
  if(idx>=LYRICS.length) return;
  showLine(LYRICS[idx++], next);
}

// Title screen out
gsap.to(titleSc, {opacity:0, duration:0.5, delay:3,
  onComplete:()=>{
    titleSc.style.display='none';
    gsap.fromTo(hud,{opacity:0},{opacity:1,duration:0.4});
    spawnExplosion(window.innerWidth*0.5, window.innerHeight*0.5);
    setTimeout(next, 600);
  }
});
</script>
</body>
</html>
