<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Karaoke — Portrait Premium</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://unpkg.com/splitting/dist/splitting.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/splitting/dist/splitting.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --accent-r:120;--accent-g:180;--accent-b:255;
  --accent:    rgb(var(--accent-r),var(--accent-g),var(--accent-b));
  --accent-20: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.20);
  --accent-40: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.40);
  --accent-60: rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.60);
  --bg:        #07080c;
  --surface:   #0d1018;
  --on-bg:     #f0f2f8;
  --muted:     rgba(240,242,248,0.20);
  --muted-hi:  rgba(240,242,248,0.38);
  --radius-cover:15px;
  --font-lyric:'Bebas Neue',sans-serif;
  --font-meta: 'DM Sans',sans-serif;
  --font-title:'Cormorant Garamond',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-meta)}

body::after{
  content:'';position:fixed;inset:0;z-index:998;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  opacity:0.4;mix-blend-mode:soft-light;
}

#app{display:flex;flex-direction:column;width:100%;height:100%;position:relative;z-index:1}

/* ── THREE.JS GALAXY BACKGROUND ── */
#three-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

/* ── RESTART BUTTON ── */
#btn-restart{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;
  border:1.5px solid rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.35);
  background:rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.08);
  cursor:pointer;transition:all 0.25s ease;
  color:var(--accent);
  outline:none;backdrop-filter:blur(6px);
}
#btn-restart:hover{
  background:rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.22);
  border-color:var(--accent);
  box-shadow:0 0 14px rgba(var(--accent-r),var(--accent-g),var(--accent-b),0.4);
  transform:scale(1.08);
}
#btn-restart:active{ transform:scale(0.94); }
#btn-restart svg{ pointer-events:none; }

/* ── COVER AREA ── */
#cover-panel{
  flex:0 0 45%;position:relative;
  overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-top:20px;
}
#cover-bg{
  position:absolute;inset:-30px;
  background-image:url('{{COVER_IMAGE}}');
  background-size:cover;background-position:center;
  filter:blur(40px) brightness(0.2) saturate(2);
  transform:scale(1.2);
}
#cover-panel::after{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(180deg,transparent 60%,var(--bg) 100%);
}
#cover-glow{
  position:absolute;z-index:1;width:60%;height:60%;border-radius:50%;
  background:radial-gradient(circle,var(--accent-20) 0%,transparent 70%);
  filter:blur(40px);
  animation:glow-breathe 5s ease-in-out infinite alternate;
}
@keyframes glow-breathe{0%{transform:scale(0.8);opacity:0.4}100%{transform:scale(1.1);opacity:1}}

#cover-img{
  position:relative;z-index:2;
  width:min(240px,55vw);height:min(240px,55vw);
  object-fit:cover;border-radius:var(--radius-cover);
  box-shadow:0 15px 40px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.05),0 0 60px var(--accent-20);
  animation:cover-float 8s ease-in-out infinite;
}
@keyframes cover-float{
  0%,100%{transform:translateY(0) rotate(-1deg)}
  50%{transform:translateY(-15px) rotate(1deg)}
}
#cover-meta{
  position:relative;z-index:3;margin-top:20px;text-align:center;padding:0 20px;
}
#cover-title{
  font-family:var(--font-title);font-style:italic;font-size:clamp(1.6rem,7vw,2.8rem);
  color:var(--on-bg);line-height:1.1;text-shadow:0 4px 20px rgba(0,0,0,0.9);
}
#cover-artist{
  font-size:clamp(0.6rem,2.8vw,0.85rem);color:rgba(240,242,248,0.4);
  letter-spacing:0.25em;text-transform:uppercase;margin-top:10px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
#cover-artist::before,#cover-artist::after{content:'';width:15px;height:1px;background:var(--accent-40)}

/* ── LYRIC AREA ── */
#lyric-panel{
  flex:1;display:flex;flex-direction:column;
  padding:0 clamp(20px,6vw,40px);overflow:hidden;position:relative;
}
#lyric-window{
  flex:1;overflow:hidden;position:relative;z-index:2;
  mask-image:linear-gradient(180deg,transparent 0%,black 15%,black 80%,transparent 100%);
  -webkit-mask-image:linear-gradient(180deg,transparent 0%,black 15%,black 80%,transparent 100%);
}
#lyric-scroll{transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);text-align:center}

.lyric-line{
  padding:14px 0;font-family:var(--font-lyric);letter-spacing:0.06em;
  font-size:clamp(1.4rem,6.5vw,2.4rem);line-height:1.15;
  color:var(--muted);transition:color 0.4s ease;position:relative;
}
.lyric-line.past{color:var(--muted-hi);opacity:0.6}
.lyric-line.active{color:transparent}

/* APPLE MUSIC SHIMMER */
.lyric-line .char{display:inline-block;color:var(--muted);transition:color 0.4s ease}
.lyric-line.past .char{color:var(--muted-hi)}

.lyric-line.active .char{
  -webkit-text-fill-color:transparent;
  background:linear-gradient(90deg,rgba(255,255,255,0.5) 0%,#fff 45%,#fff 55%,rgba(255,255,255,0.5) 100%);
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;
  filter:drop-shadow(0 0 8px rgba(255,255,255,0.3));
  animation:char-pop 0.4s ease-out both,char-shine 3s linear infinite;
  animation-delay:calc(var(--char-index)*0.03s),calc(var(--char-index)*0.05s);
}
@keyframes char-pop{
  0%{opacity:0;transform:scale(0.8) translateY(10px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes char-shine{0%{background-position:180% center}100%{background-position:-180% center}}

/* ── WAVEFORM AREA ── */
#viz-container{
  flex-shrink:0;padding:10px 0 30px;display:flex;flex-direction:column;gap:10px;
}
#waveform-time{
  display:flex;align-items:center;gap:12px;font-family:var(--font-meta);
  font-size:0.75rem;font-weight:500;color:rgba(240,242,248,0.35);letter-spacing:0.05em;
}
#time-current{min-width:32px;text-align:right;color:var(--accent)}
#time-total{min-width:32px}
#waveform-track{
  flex:1;position:relative;height:50px;cursor:pointer;
  background:rgba(255,255,255,0.02);border-radius:6px;overflow:hidden;
}
#waveform-draw{position:absolute;inset:0;width:100%;height:100%}
#waveform-progress{
  position:absolute;top:0;left:0;width:0%;height:100%;
  background:transparent;border-right:2px solid var(--accent);
  box-shadow:0 0 15px var(--accent-60);pointer-events:none;z-index:2;
}

#visual-selector {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--on-bg);
  border-radius: 6px;
  padding: 3px 6px;
  font-family: var(--font-meta);
  font-size: 0.68rem;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  backdrop-filter: blur(8px);
  transition: all 0.3s ease;
  margin-right: 5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
#visual-selector:hover {
  background: rgba(var(--accent-r), var(--accent-g), var(--accent-b), 0.15);
  border-color: var(--accent-40);
}
#visual-selector option {
  background: #111;
  color: #fff;
}

/* ── SYNC PANEL ── */
#sync-panel {
  position: fixed; top: 20px; right: 20px; z-index: 1000;
  width: 240px; padding: 15px; border-radius: 12px;
  background: rgba(13, 16, 24, 0.85); backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  display: flex; flex-direction: column; gap: 12px;
  transform: translateX(280px); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
#sync-panel.open { transform: translateX(0); }
#sync-toggle-btn {
  position: fixed; top: 20px; right: 20px; z-index: 1001;
  background: rgba(var(--accent-r), var(--accent-g), var(--accent-b), 0.15);
  border: 1px solid var(--accent-40); color: var(--accent);
  padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 600;
  cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
  transition: all 0.3s ease;
}
#sync-toggle-btn:hover { background: var(--accent-40); color: #fff; }
#sync-toggle-btn.active { right: 270px; }

#sync-now-btn {
  background: var(--accent); color: #000; border: none;
  padding: 18px; border-radius: 10px; font-weight: 800; font-size: 1.1rem;
  cursor: pointer; transition: transform 0.1s, background 0.3s;
  box-shadow: 0 0 20px var(--accent-40);
  text-transform: uppercase; letter-spacing: 0.1em;
}
#sync-now-btn:active { transform: scale(0.94); background: #fff; }

.sync-nudge-row { display: flex; gap: 6px; }
.sync-nudge-btn {
  flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: #fff; padding: 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer;
}
.sync-nudge-btn:hover { background: rgba(255,255,255,0.12); }

#sync-current-label { font-size: 0.6rem; color: var(--muted-hi); text-transform: uppercase; }
#sync-current-text { 
  font-size: 0.85rem; color: #fff; font-weight: 500; 
  height: 44px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}

#sync-copy-btn {
  background: transparent; border: 1px dashed var(--accent-40); color: var(--accent);
  padding: 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; margin-top: 5px;
}
#sync-copy-btn:hover { border-style: solid; background: var(--accent-20); }

</style>
</head>
<body>
<audio id="main-audio" src="{{AUDIO_DATA}}" preload="auto" crossorigin="anonymous"></audio>

<canvas id="three-bg"></canvas>

<div id="app">
  <div id="cover-panel">
    <div id="cover-bg"></div>
    <div id="cover-glow"></div>
    <img id="cover-img" src="{{COVER_IMAGE}}" alt="cover" crossorigin="anonymous">
    <div id="cover-meta">
      <div id="cover-title">{{SONG_NAME}}</div>
      <div id="cover-artist">{{ARTIST_NAME}}</div>
    </div>
  </div>

  <div id="lyric-panel">
    <div id="lyric-window">
      <div id="lyric-scroll"></div>
    </div>
    <div id="viz-container">
      <div id="waveform-time">
        <span id="time-current">0:00</span>
        <div id="waveform-track">
          <div id="waveform-progress"></div>
          <canvas id="waveform-draw"></canvas>
        </div>
        <span id="time-total">0:00</span>
        <select id="visual-selector" title="Visualizador">
          <option value="galaxy">Galaxia</option>
          <option value="heart">Corazón</option>
        </select>
        <button id="btn-restart" title="Reiniciar canción" aria-label="Reiniciar">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <button id="sync-toggle-btn">Sincronizar</button>
  <div id="sync-panel">
    <div id="sync-current-label">Frase Actual:</div>
    <div id="sync-current-text">--</div>
    <button id="sync-now-btn">¡AHORA!</button>
    <div class="sync-nudge-row">
      <button class="sync-nudge-btn" id="sync-nudge-back">-0.1s</button>
      <button class="sync-nudge-btn" id="sync-nudge-next">+0.1s</button>
    </div>
    <button id="sync-copy-btn">Copiar SRT Corregido</button>
  </div>
</div>

<script>
const LYRICS_RAW = [{{LYRICS_JSON}}];
const LYRICS = typeof LYRICS_RAW[0] === 'string'
  ? LYRICS_RAW.map(text => ({ text, startMs: null, endMs: null }))
  : LYRICS_RAW;

const ACTIVE_IDX = 2;
let currentIdx   = 0;
const audioEl    = document.getElementById('main-audio');

const scrollEl = document.getElementById('lyric-scroll');
const lineEls  = [];
LYRICS.forEach((lineObj, i) => {
  const el = document.createElement('div');
  el.className = 'lyric-line';
  el.textContent  = lineObj.text;
  scrollEl.appendChild(el);
  lineEls.push(el);
});
Splitting({ target: '.lyric-line', by: 'chars' });

/* ── Color Engine ── */
const coverImg = document.getElementById('cover-img');
function applyAccent(r,g,b){
  const max = Math.max(r,g,b);
  const boost = max < 60 ? 3.5 : max < 100 ? 2.8 : max < 150 ? 2.0 : 1.5;
  r = Math.min(255, Math.round(r * boost));
  g = Math.min(255, Math.round(g * boost));
  b = Math.min(255, Math.round(b * boost));
  const newMax = Math.max(r,g,b);
  if(newMax < 160 && newMax > 0){
    const lift = 160 / newMax;
    r = Math.min(255, Math.round(r * lift));
    g = Math.min(255, Math.round(g * lift));
    b = Math.min(255, Math.round(b * lift));
  }
  const root = document.documentElement;
  root.style.setProperty('--accent-r', r||120);
  root.style.setProperty('--accent-g', g||180);
  root.style.setProperty('--accent-b', b||255);
}
function tryColorThief(){
  try{
    const ct = new ColorThief();
    const pal = ct.getPalette(coverImg, 5);
    let best = pal[0], bestSat = 0;
    pal.forEach(([r,g,b]) => {
      const max=Math.max(r,g,b), min=Math.min(r,g,b);
      const sat=max===0?0:(max-min)/max;
      if(sat > bestSat){ bestSat=sat; best=[r,g,b]; }
    });
    applyAccent(...best);
  }catch(e){}
}
coverImg.addEventListener('load', tryColorThief);
if(coverImg.complete && coverImg.naturalWidth) tryColorThief();

/* ── Sync ── */
function updateLines(){
  lineEls.forEach((el,i) => {
    el.classList.remove('active','past');
    if(i === currentIdx) el.classList.add('active');
    else if(i < currentIdx) el.classList.add('past');
  });
  const lineH  = lineEls[0] ? lineEls[0].offsetHeight : 60;
  const offset = Math.max(0, currentIdx - ACTIVE_IDX) * lineH;
  scrollEl.style.transform = `translateY(-${offset}px)`;
}
function advance(){
  if(currentIdx >= LYRICS.length) return;
  updateLines();
  const line = LYRICS[currentIdx];
  const hold = line.startMs === null 
    ? Math.max(1400, line.text.length * 68) 
    : Math.max(10, (LYRICS[currentIdx+1]?.startMs ?? line.startMs + 3000) - line.startMs);
  window._lyricsTimeout = setTimeout(() => { currentIdx++; advance(); }, hold);
}

/* ── Wave Engine ── */
const canvas = document.getElementById('waveform-draw');
const ctx2d  = canvas.getContext('2d');
const progress = document.getElementById('waveform-progress');
const timeCur  = document.getElementById('time-current');
const timeTot  = document.getElementById('time-total');
const track    = document.getElementById('waveform-track');
let audioDuration = 0, waveformData = null;

function fmt(s){ return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }
function getAccent(alpha){
  const s = getComputedStyle(document.documentElement);
  return `rgba(${s.getPropertyValue('--accent-r').trim()},${s.getPropertyValue('--accent-g').trim()},${s.getPropertyValue('--accent-b').trim()},${alpha})`;
}

function drawWaveform(){
  if(!waveformData) return;
  const rect = canvas.getBoundingClientRect();
  const DPR = window.devicePixelRatio||1;
  const W = rect.width*DPR, H = rect.height*DPR;
  canvas.width = W; canvas.height = H;
  ctx2d.clearRect(0,0,W,H);
  const samples = waveformData.length, barW = W/samples, cx = H/2;
  const playedX = audioDuration ? (audioEl.currentTime/audioDuration)*W : 0;

  for(let i=0; i<samples; i++){
    const x=i*barW, amp=waveformData[i]*cx*0.85, played=x<playedX;
    ctx2d.fillStyle = played ? getAccent(0.9) : 'rgba(255,255,255,0.15)';
    ctx2d.beginPath();
    ctx2d.roundRect(x+0.5, cx-amp/2, Math.max(1, barW-1.5), amp, 1);
    ctx2d.fill();
  }
}

async function buildWaveform(arrayBuffer){
  try{
    const tmpCtx = new AudioContext();
    const decoded = await tmpCtx.decodeAudioData(arrayBuffer);
    await tmpCtx.close();
    audioDuration = decoded.duration;
    timeTot.textContent = fmt(audioDuration);
    const rawData = decoded.getChannelData(0);
    const rect = canvas.getBoundingClientRect();
    const samples = Math.floor((rect.width||300)/3.5);
    const blockSize = Math.floor(rawData.length/samples);
    const filtered = [];
    for(let i=0; i<samples; i++){
      let sum=0; for(let j=0; j<blockSize; j++) sum+=Math.abs(rawData[i*blockSize+j]);
      filtered.push(sum/blockSize);
    }
    const maxVal = Math.max(...filtered)||1;
    waveformData = filtered.map(v => v/maxVal);
    requestAnimationFrame(drawWaveform);
  }catch(e){}
}

async function autoInitWaveform(){
  if(!audioEl.src) return;
  try{
    const res = await fetch(audioEl.src);
    const buf = await res.arrayBuffer();
    await buildWaveform(buf);
  }catch(e){}
}

audioEl.addEventListener('timeupdate', () => {
  if(!audioDuration) return;
  progress.style.width = (audioEl.currentTime/audioDuration*100)+'%';
  timeCur.textContent = fmt(audioEl.currentTime);
  drawWaveform();
});

track.addEventListener('click', e => {
  if(!audioDuration) return;
  const rect = track.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX-rect.left)/rect.width)*audioDuration;
});

window.seekTo = function(ms){
  let idx=0; for(let i=0; i<LYRICS.length; i++){ if((LYRICS[i].startMs??i*3000)<=ms) idx=i; }
  if(currentIdx!==idx){ currentIdx=idx; updateLines(); }
  audioEl.currentTime = ms/1000;
  if(audioDuration){
    progress.style.width=(audioEl.currentTime/audioDuration*100)+'%';
    timeCur.textContent=fmt(audioEl.currentTime);
    drawWaveform();
  }
};

window.IS_RENDERING = false;

/* ── AnalyserNode para visualización en tiempo real ── */
let audioCtxP = null, analyserP = null;
window._freqDataP = null;

function initAnalyserPortrait(){
  if(audioCtxP){ audioCtxP.resume(); return; }
  try{
    audioCtxP  = new (window.AudioContext || window.webkitAudioContext)();
    analyserP  = audioCtxP.createAnalyser();
    analyserP.fftSize = 256;
    analyserP.smoothingTimeConstant = 0.8;
    const src  = audioCtxP.createMediaElementSource(audioEl);
    src.connect(analyserP);
    analyserP.connect(audioCtxP.destination);
    window._freqDataP = new Uint8Array(analyserP.frequencyBinCount);
  }catch(e){}
}
audioEl.addEventListener('play', initAnalyserPortrait);
/* Un clic en cualquier parte desbloquea el audio analizado */
document.addEventListener('click', initAnalyserPortrait, { once: true });

/* ── THREE.JS GALAXY (Portrait) ── */
(function(){
  const threeCanvas = document.getElementById('three-bg');
  const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
  camera.position.set(0, 2.5, 6);
  camera.lookAt(0, 0, 0);

  let points   = null;
  let currentVisualType = 'galaxy';

  /* ── LÓGICA DE SINCRONIZACIÓN EN VIVO ── */
  let isSyncMode = false;
  const syncBtn = document.getElementById('sync-toggle-btn');
  const syncPanel = document.getElementById('sync-panel');
  const syncNow = document.getElementById('sync-now-btn');
  const syncCurrent = document.getElementById('sync-current-text');

  syncBtn.addEventListener('click', () => {
    isSyncMode = !isSyncMode;
    syncPanel.classList.toggle('open', isSyncMode);
    syncBtn.classList.toggle('active', isSyncMode);
    syncBtn.innerText = isSyncMode ? "Cerrar Ajuste" : "Sincronizar";
    updateSyncUI();
  });

  function updateSyncUI() {
    if(!isSyncMode) return;
    const line = LYRICS[currentIdx];
    syncCurrent.innerText = line ? line.text : "Fin de la letra";
  }

  function markCurrentTime() {
    if(!isSyncMode || !LYRICS[currentIdx]) return;
    const timeMs = Math.round(audioEl.currentTime * 1000);
    LYRICS[currentIdx].startMs = timeMs;
    
    // Si la línea anterior no tiene endMs, se lo ponemos ahora
    if(currentIdx > 0 && !LYRICS[currentIdx-1].endMs) {
      LYRICS[currentIdx-1].endMs = timeMs;
    }

    currentIdx++;
    updateLines();
    updateSyncUI();
    
    // Pequeño flash visual en el botón
    syncNow.style.background = "#fff";
    setTimeout(() => { syncNow.style.background = "var(--accent)"; }, 100);
  }

  syncNow.addEventListener('click', markCurrentTime);
  window.addEventListener('keydown', (e) => {
    if(isSyncMode && e.code === 'Space') {
      e.preventDefault();
      markCurrentTime();
    }
  });

  document.getElementById('sync-nudge-back').addEventListener('click', () => {
    const idx = Math.max(0, currentIdx - 1);
    if(LYRICS[idx]) {
       LYRICS[idx].startMs = Math.max(0, (LYRICS[idx].startMs || 0) - 100);
       updateLines();
    }
  });

  document.getElementById('sync-nudge-next').addEventListener('click', () => {
    const idx = Math.max(0, currentIdx - 1);
    if(LYRICS[idx]) {
       LYRICS[idx].startMs = (LYRICS[idx].startMs || 0) + 100;
       updateLines();
    }
  });

  document.getElementById('sync-copy-btn').addEventListener('click', () => {
    let srt = "";
    LYRICS.forEach((line, i) => {
      const start = formatSRTTime(line.startMs || 0);
      const end = formatSRTTime(line.endMs || (line.startMs || 0) + 2000);
      srt += `${i+1}\n${start} --> ${end}\n${line.text}\n\n`;
    });
    navigator.clipboard.writeText(srt);
    const oldTxt = document.getElementById('sync-copy-btn').innerText;
    document.getElementById('sync-copy-btn').innerText = "¡COPIADO!";
    setTimeout(() => { document.getElementById('sync-copy-btn').innerText = oldTxt; }, 2000);
  });

  function formatSRTTime(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const mm = Math.floor(ms % 1000);
    return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')},${mm.toString().padStart(3,'0')}`;
  }

  function rebuildVisualizer(ar, ag, ab){
    if(points){ points.geometry.dispose(); points.material.dispose(); scene.remove(points); }

    const COUNT      = 7000;
    const positions  = new Float32Array(COUNT * 3);
    const colors     = new Float32Array(COUNT * 3);

    const cCore  = new THREE.Color(1.0,  0.95, 0.85); 
    const cMid   = new THREE.Color(ar/255, ag/255, ab/255);
    const cEdge  = new THREE.Color(ar/255*0.4, ag/255*0.4, ab/255*0.4);

    if(currentVisualType === 'galaxy'){
      const ARMS       = 3;
      const RADIUS     = 5.5;
      const SPIN       = 2.2;
      const RANDOM_POW = 3.0;
      const RAND_SCALE = 0.22;

      for(let i = 0; i < COUNT; i++){
        const i3 = i * 3, r = Math.sqrt(Math.random()) * RADIUS, arm = (i % ARMS) / ARMS * Math.PI * 2, ang = arm + r * SPIN;
        const spread = RAND_SCALE * r;
        const rx = Math.pow(Math.random(), RANDOM_POW) * (Math.random()<0.5?1:-1) * spread;
        const ry = Math.pow(Math.random(), RANDOM_POW) * (Math.random()<0.5?1:-1) * spread * 0.25;
        const rz = Math.pow(Math.random(), RANDOM_POW) * (Math.random()<0.5?1:-1) * spread;
        positions[i3] = Math.cos(ang) * r + rx; positions[i3+1] = ry; positions[i3+2] = Math.sin(ang) * r + rz;
        const t = r / RADIUS;
        const c = t < 0.4 ? cCore.clone().lerp(cMid, t / 0.4) : cMid.clone().lerp(cEdge, (t - 0.4) / 0.6);
        colors[i3] = c.r; colors[i3+1] = c.g; colors[i3+2] = c.b;
      }
    } else {
      // CORAZÓN 3D
      for(let i = 0; i < COUNT; i++){
        const i3 = i * 3, t = Math.random() * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3), y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        const depth = (Math.random() - 0.5) * 5.0, noise = 0.8;
        const scale = 0.14; 
        positions[i3] = x * scale + (Math.random()-0.5)*noise;
        positions[i3+1] = y * scale + (Math.random()-0.5)*noise + 0.5;
        positions[i3+2] = depth * 0.1 + (Math.random()-0.5)*noise;
        const dist = Math.sqrt(positions[i3]**2 + positions[i3+1]**2);
        const ct = Math.min(1, dist / 2.5);
        const c = ct < 0.5 ? cCore.clone().lerp(cMid, ct / 0.5) : cMid.clone().lerp(cEdge, (ct - 0.5) / 0.5);
        colors[i3] = c.r; colors[i3+1] = c.g; colors[i3+2] = c.b;
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
    const mat = new THREE.PointsMaterial({
      size: 0.018, sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending,
      vertexColors: true, transparent: true, opacity: 0.9
    });
    points = new THREE.Points(geo, mat);
    scene.add(points);
  }

  rebuildVisualizer(120, 180, 255);
  window._updateGalaxyAccent = function(r,g,b){ 
    window._lastR=r; window._lastG=g; window._lastB=b;
    rebuildVisualizer(r,g,b); 
  };

  document.getElementById('visual-selector').addEventListener('change', (e) => {
    currentVisualType = e.target.value;
    rebuildVisualizer(window._lastR||120, window._lastG||180, window._lastB||255);
  });

  let clock = 0;
  const BASE_Z = 6.0, BASE_Y = 2.5;

  function galaxyLoop(){
    requestAnimationFrame(galaxyLoop);
    clock += 0.005;

    let bass = 0, mid = 0;
    const an = window._analyserNode;
    const fd = window._freqData;
    if(an && fd){
      an.getByteFrequencyData(fd);
      for(let i = 0;  i < 6;  i++) bass   += fd[i]; 
      for(let i = 6;  i < 20; i++) mid    += fd[i]; 
      bass /= (6*255); mid /= (14*255);
    }

    /* BALANCEO SUTIL */
    const rotationSwing = Math.sin(clock * 0.15) * 0.12; 
    if(points) points.rotation.y = rotationSwing * (1 + bass * 1.5);

    /* ZOOM REACTIVO */
    const targetZ = BASE_Z - (bass * 3.5); 
    camera.position.z += (targetZ - camera.position.z) * 0.12;
    camera.position.x = 0;
    camera.position.y = BASE_Y;
    camera.lookAt(0, 0, 0);

    if(points) {
      points.material.size = 0.015 + (bass * 0.05);
      points.material.opacity = 0.5 + (mid * 0.5);
    }

    renderer.render(scene, camera);
  }
  galaxyLoop();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
})();

window.IS_RENDERING = false;

function init(){
  resizeCanvas();
  drawLoop();
  if(!window.IS_RENDERING){
    audioEl.play().catch(()=>{});
    const delay = LYRICS[0]?.startMs ?? 0;
    setTimeout(advance, delay);
  }
}

/* ── Botón Restart ── */
document.getElementById('btn-restart').addEventListener('click', () => {
  if(window._lyricsTimeout) clearTimeout(window._lyricsTimeout);
  audioEl.currentTime = 0;
  audioEl.play().catch(()=>{});
  currentIdx = 0;
  updateLines();
  const delay = LYRICS[0]?.startMs ?? 0;
  window._lyricsTimeout = setTimeout(advance, delay);
});

audioEl.addEventListener('play', initAnalyser);
audioEl.addEventListener('canplay', () => {
  initAnalyser();
  audioCtx?.resume();
}, { once: true });

setTimeout(init, 400);
window.addEventListener('resize', drawWaveform);
</script>
</body>
