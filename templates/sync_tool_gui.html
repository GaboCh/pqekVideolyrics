<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincronizador pqek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --accent: #7c6af7;
            --accent-glow: rgba(124, 106, 247, 0.3);
            --card: #141416;
            --text: #e8e8ed;
            --text-dim: #a1a1aa;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
        .container { max-width: 800px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
        h2 { font-weight: 800; text-align: center; margin: 0; color: var(--accent); }
        
        .setup-area {
            background: var(--card); border: 1px solid rgba(255,255,255,0.08);
            padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px;
        }
        textarea {
            background: #000; border: 1px solid #333; color: #fff;
            padding: 12px; border-radius: 8px; resize: vertical; min-height: 100px;
            font-family: inherit; font-size: 0.9rem;
        }
        .btn-start {
            background: var(--accent); color: #fff; border: none; padding: 12px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-start:hover { transform: scale(1.02); filter: brightness(1.1); }

        .sync-area { display: none; flex-direction: column; gap: 20px; }
        .sync-area.active { display: flex; }

        #audio-player { width: 100%; filter: invert(1); margin-bottom: 10px; }

        .marking-zone {
            display: grid; grid-template-columns: 1fr 200px; gap: 20px;
        }

        .lyrics-list {
            background: var(--card); border-radius: 12px; padding: 10px;
            max-height: 400px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1);
        }
        .lyric-line {
            padding: 10px 15px; border-radius: 8px; margin-bottom: 5px;
            color: var(--text-dim); transition: 0.2s; font-size: 1rem;
        }
        .lyric-line.active {
            background: var(--accent-glow); color: #fff; font-weight: 600; 
            border-left: 4px solid var(--accent);
        }
        .lyric-line.done { color: var(--accent); opacity: 0.6; }

        .controls {
            display: flex; flex-direction: column; gap: 15px;
        }
        #btn-tap {
            background: var(--accent); color: #fff; border: none;
            width: 100%; height: 160px; border-radius: 16px;
            font-size: 1.5rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 30px var(--accent-glow);
            transition: transform 0.1s; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 10px;
        }
        #btn-tap:active { transform: scale(0.95); background: #fff; color: #000; }
        #btn-tap span { font-size: 0.8rem; font-weight: 400; opacity: 0.8; }

        .output-area {
            background: #000; padding: 15px; border-radius: 12px;
            border: 1px dashed var(--accent); margin-top: 20px; display: none;
        }
        .output-area.active { display: block; }
        pre { white-space: pre-wrap; font-size: 0.8rem; height: 150px; overflow-y: auto; margin: 0; }
        
        .btn-copy {
            background: #fff; color: #000; border: none; padding: 10px;
            width: 100%; border-radius: 8px; font-weight: 600; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sincronización Fácil</h2>

    <div class="setup-area" id="setup">
        <div style="font-size: 0.9rem; color: var(--text-dim)">
            1. Pega la letra de tu canción abajo.<br>
            2. Selecciona el archivo de audio.<br>
            3. Presiona "Empezar" para comenzar a marcar.
        </div>
        <textarea id="raw-lyrics" placeholder="Pega aquí la letra línea por línea..."></textarea>
        <input type="file" id="audio-file" accept="audio/*" style="color: var(--text-dim)">
        <button class="btn-start" id="btn-begin">EMPEZAR A SINCRONIZAR</button>
    </div>

    <div class="sync-area" id="sync">
        <audio id="audio-player" controls></audio>
        
        <div class="marking-zone">
            <div class="lyrics-list" id="lyric-list"></div>
            <div class="controls">
                <button id="btn-tap">
                    ¡MARCAR!
                    <span>O presiona ESPACIO</span>
                </button>
                <button class="btn-start" style="background: #333;" onclick="window.location.reload()">REINICIAR</button>
                <div style="font-size: 0.7rem; color: var(--text-dim); text-align: center;">
                    Presiona el botón justo cuando empiece la frase.
                </div>
            </div>
        </div>

        <div class="output-area" id="output">
            <div style="margin-bottom: 10px; font-weight: 600;">Letra Sincronizada (SRT):</div>
            <pre id="srt-text"></pre>
            <button class="btn-copy" id="btn-copy">COPIAR AL PORTAPAPELES</button>
        </div>
    </div>
</div>

<script>
    let lines = [];
    let currentIdx = 0;
    const setup = document.getElementById('setup');
    const sync = document.getElementById('sync');
    const lyricList = document.getElementById('lyric-list');
    const tapBtn = document.getElementById('btn-tap');
    const player = document.getElementById('audio-player');
    const srtText = document.getElementById('srt-text');
    const output = document.getElementById('output');

    document.getElementById('btn-begin').onclick = () => {
        const text = document.getElementById('raw-lyrics').value.trim();
        if(!text) { alert("¡Pega la letra primero!"); return; }
        
        const file = document.getElementById('audio-file').files[0];
        if(!file) { alert("¡Selecciona el archivo de audio!"); return; }

        lines = text.split('\n').filter(l => l.trim() !== "").map(t => ({ text: t.trim(), startMs: null }));
        player.src = URL.createObjectURL(file);
        
        renderLines();
        setup.style.display = 'none';
        sync.classList.add('active');
    };

    function renderLines() {
        lyricList.innerHTML = "";
        lines.forEach((line, i) => {
            const div = document.createElement('div');
            div.className = 'lyric-line' + (i === currentIdx ? ' active' : '');
            div.innerText = line.text;
            lyricList.appendChild(div);
        });
    }

    function mark() {
        if(currentIdx >= lines.length) return;
        
        const timeMs = Math.round(player.currentTime * 1000);
        lines[currentIdx].startMs = timeMs;
        
        const lineElements = lyricList.querySelectorAll('.lyric-line');
        lineElements[currentIdx].classList.remove('active');
        lineElements[currentIdx].classList.add('done');
        
        currentIdx++;
        
        if(currentIdx < lines.length) {
            lineElements[currentIdx].classList.add('active');
            lineElements[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
            generateSRT();
        }

        // Feedback visual
        tapBtn.style.background = "#fff";
        tapBtn.style.color = "#000";
        setTimeout(() => { tapBtn.style.background = "var(--accent)"; tapBtn.style.color = "#fff"; }, 100);
    }

    function generateSRT() {
        let srt = "";
        lines.forEach((line, i) => {
            const start = formatSRTTime(line.startMs);
            const end = (i < lines.length - 1) ? formatSRTTime(lines[i+1].startMs) : formatSRTTime(line.startMs + 2500);
            srt += `${i+1}\n${start} --> ${end}\n${line.text}\n\n`;
        });
        srtText.innerText = srt;
        output.classList.add('active');
        output.scrollIntoView({ behavior: 'smooth' });
    }

    function formatSRTTime(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        const mm = Math.floor(ms % 1000);
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')},${mm.toString().padStart(3,'0')}`;
    }

    tapBtn.onclick = mark;
    window.onkeydown = (e) => {
        if(sync.classList.contains('active') && e.code === 'Space') {
            e.preventDefault();
            mark();
        }
    };

    document.getElementById('btn-copy').onclick = () => {
        navigator.clipboard.writeText(srtText.innerText);
        const btn = document.getElementById('btn-copy');
        btn.innerText = "¡COPIADO!";
        setTimeout(() => btn.innerText = "COPIAR AL PORTAPAPELES", 2000);
    };
</script>

</body>
</html>
