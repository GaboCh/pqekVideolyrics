<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lyric Video — Pixel Retro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:#5c94fc; /* Mario sky blue */
    image-rendering:pixelated;
    font-family:'Press Start 2P',monospace;
  }

  /* ── Sky gradient ── */
  #sky{
    position:fixed;inset:0;z-index:0;
    background:linear-gradient(to bottom, #3c6bcd 0%, #5c94fc 60%, #5c94fc 100%);
  }

  /* ── Clouds (CSS pixel art) ── */
  .cloud{
    position:absolute;z-index:1;
    image-rendering:pixelated;
  }
  .cloud::before,.cloud::after{
    content:'';position:absolute;background:#fff;
  }
  .cloud-a{width:96px;height:32px;background:#fff;border-radius:0;}
  .cloud-a::before{width:48px;height:16px;background:#fff;top:-16px;left:24px;}
  .cloud-a::after{width:80px;height:16px;background:#fff;bottom:-16px;left:8px;}

  /* ── Ground ── */
  #ground{
    position:fixed;bottom:0;left:0;right:0;height:64px;z-index:5;
    background:#5a3e1b;
    border-top:8px solid #8b6914;
  }
  #ground::before{
    content:'';position:absolute;top:-8px;left:0;right:0;height:8px;
    background:repeating-linear-gradient(90deg,#6d8a52 0,#6d8a52 64px,#5c7d42 64px,#5c7d42 128px);
  }

  /* ── Pipes ── */
  .pipe{
    position:fixed;bottom:64px;z-index:4;
    width:48px;
  }
  .pipe-body{width:48px;height:80px;background:#2e7d32;border-left:4px solid #4caf50;border-right:4px solid #1b5e20;}
  .pipe-cap{width:60px;height:20px;background:#2e7d32;border:4px solid #4caf50;border-bottom:none;margin-left:-6px;}

  /* ── Question blocks ── */
  .qblock{
    position:fixed;z-index:4;
    width:40px;height:40px;
    background:#e65c00;
    border:4px solid #ff8f00;
    display:flex;align-items:center;justify-content:center;
    color:#ffcc02;font-size:20px;font-family:monospace;font-weight:900;
    box-shadow:inset -4px -4px 0 #8B3A00,inset 4px 4px 0 #FF6D00;
  }

  /* ── Pixel character (Mario-style via box-shadow) ── */
  #character{
    position:fixed;
    bottom:128px;
    left:10%;
    z-index:10;
    width:0;height:0;
    /* Hat */
    box-shadow:
      /* hat top */
      8px 0px 0 0 #e52222, 16px 0px 0 0 #e52222, 24px 0px 0 0 #e52222,
      /* hat brim */
      0px 8px 0 0 #e52222, 8px 8px 0 0 #e52222, 16px 8px 0 0 #e52222, 24px 8px 0 0 #e52222, 32px 8px 0 0 #e52222, 40px 8px 0 0 #e52222,
      /* face */
      8px 16px 0 0 #f8c08c, 16px 16px 0 0 #f8c08c, 24px 16px 0 0 #f8c08c, 32px 16px 0 0 #f8c08c,
      /* eyes/mustache */
      16px 24px 0 0 #000, 24px 24px 0 0 #000,
      8px 32px 0 0 #f8c08c, 16px 32px 0 0 #f8c08c, 24px 32px 0 0 #f8c08c, 32px 32px 0 0 #f8c08c,
      /* body blue */
      0px 40px 0 0 #1565c0, 8px 40px 0 0 #e52222, 16px 40px 0 0 #e52222, 24px 40px 0 0 #e52222, 32px 40px 0 0 #1565c0,
      0px 48px 0 0 #1565c0, 8px 48px 0 0 #1565c0, 16px 48px 0 0 #1565c0, 24px 48px 0 0 #1565c0, 32px 48px 0 0 #1565c0,
      /* legs */
      8px 56px 0 0 #1565c0, 16px 56px 0 0 #000, 24px 56px 0 0 #1565c0,
      0px 64px 0 0 #8b4513, 8px 64px 0 0 #8b4513, 24px 64px 0 0 #8b4513, 32px 64px 0 0 #8b4513;
    width:8px;height:8px;background:transparent;
    transform:scale(1.5);
    transform-origin:left bottom;
  }

  /* ── Stars / coins ── */
  .star{
    position:fixed;z-index:3;
    font-size:clamp(12px,2vw,20px);
    color:#ffcc02;
    opacity:0;
    pointer-events:none;
    font-family:monospace;
  }

  /* ── Lyric box (floating above character) ── */
  #lyric-box{
    position:fixed;
    bottom:210px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    background:rgba(0,0,20,0.85);
    border:4px solid #ffcc02;
    padding:clamp(12px,2vw,24px) clamp(16px,3vw,40px);
    max-width:85vw;
    text-align:center;
    opacity:0;
    /* pixel shadow */
    box-shadow:8px 8px 0 #000, -4px -4px 0 rgba(255,204,2,0.3);
  }
  #lyric-text{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(0.9rem,2.8vw,2.2rem);
    line-height:1.5;
    color:#fff;
    letter-spacing:0.04em;
    text-shadow:3px 3px 0 #000;
    word-break:break-word;
  }
  #lyric-box-arrow{
    position:absolute;
    bottom:-20px;left:48px;
    width:16px;height:16px;
    background:#ffcc02;
    clip-path:polygon(0 0,100% 0,50% 100%);
  }

  /* ── HUD: song title top-left ── */
  #hud{
    position:fixed;top:16px;left:20px;z-index:30;
    color:#fff;font-size:clamp(0.55rem,1.4vw,1rem);
    text-shadow:2px 2px 0 #000;
    line-height:2;
    opacity:0;
  }
  #hud .score{color:#ffcc02;}

  /* ── Scrolling bg elements ── */
  .bg-hill{
    position:fixed;bottom:64px;z-index:2;
    border-radius:50% 50% 0 0;
    background:#4a7c3f;
  }

  /* Title screen overlay */
  #title-screen{
    position:fixed;inset:0;z-index:50;
    background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(16px,3vw,40px);
    opacity:1;
  }
  #ts-title{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(1.4rem,4vw,3.5rem);
    color:#ffcc02;
    text-shadow:4px 4px 0 #e52222;
    text-align:center;padding:0 20px;
    line-height:1.4;
  }
  #ts-artist{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(0.7rem,1.8vw,1.4rem);
    color:#fff;text-shadow:2px 2px 0 #000;
    text-align:center;
  }
  #ts-press{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(0.6rem,1.4vw,1rem);
    color:#fff;
    animation:blink 0.8s step-end infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<div id="sky"></div>

<!-- BG hills -->
<div class="bg-hill" style="width:280px;height:100px;right:15%;"></div>
<div class="bg-hill" style="width:160px;height:70px;right:5%;"></div>
<div class="bg-hill" style="width:200px;height:80px;left:20%;"></div>

<!-- Pixel clouds -->
<div class="cloud cloud-a" style="top:8%;left:10%;opacity:0.9;"></div>
<div class="cloud cloud-a" style="top:15%;left:55%;opacity:0.8;transform:scale(0.7)"></div>
<div class="cloud cloud-a" style="top:6%;right:10%;opacity:0.85;"></div>

<!-- Pipes -->
<div class="pipe" style="right:18%;"><div class="pipe-cap"></div><div class="pipe-body"></div></div>
<div class="pipe" style="right:4%;"><div class="pipe-cap"></div><div class="pipe-body" style="height:48px;"></div></div>

<!-- Question blocks -->
<div class="qblock" style="top:35%;right:30%;">?</div>
<div class="qblock" style="top:25%;left:40%;">?</div>

<!-- Ground -->
<div id="ground"></div>

<!-- Character -->
<div id="character"></div>

<!-- Lyric box -->
<div id="lyric-box">
  <div id="lyric-text">...</div>
  <div id="lyric-box-arrow"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div>WORLD 1-1</div>
  <div class="score">★ <span id="score">000000</span></div>
  <div>♪ {{SONG_NAME}}</div>
</div>

<!-- Title screen -->
<div id="title-screen">
  <div id="ts-title">{{SONG_NAME}}</div>
  <div id="ts-artist">{{ARTIST_NAME}}</div>
  <div id="ts-press">PRESS START ▶</div>
</div>

<script>
const LYRICS = [{{LYRICS_JSON}}];
let idx = 0;
let scoreVal = 0;

const lyricBox  = document.getElementById('lyric-box');
const lyricText = document.getElementById('lyric-text');
const charEl    = document.getElementById('character');
const hud       = document.getElementById('hud');
const scoreEl   = document.getElementById('score');
const titleScr  = document.getElementById('title-screen');

// Jump animation for block hits
function hitBlock(){
  gsap.to('.qblock', {y:-8, duration:0.08, yoyo:true, repeat:1, ease:'none'});
  spawnStar();
}

// Spawn coin star
function spawnStar(){
  const star = document.createElement('div');
  star.className='star';
  star.textContent='★';
  const srcX = parseInt(window.getComputedStyle(document.querySelector('.qblock')).left);
  star.style.left = (30 + Math.random()*40) + '%';
  star.style.bottom = '35%';
  document.body.appendChild(star);
  scoreVal += 100;
  scoreEl.textContent = String(scoreVal).padStart(6,'0');
  gsap.fromTo(star,
    {opacity:1, y:0},
    {opacity:0, y:-60, duration:0.8, ease:'power2.out', onComplete:()=>star.remove()}
  );
}

// Character run loop
let charX = 10;
let charDir = 1;
let runScaleFlip = 1;
function runChar(){
  charX += 0.15 * charDir;
  if(charX > 20) charDir = -1;
  if(charX < 8)  charDir =  1;
  runScaleFlip = charDir > 0 ? 1 : -1;
  charEl.style.left = charX + '%';
  charEl.style.transform = `scale(${1.5 * runScaleFlip}, 1.5)`;
  requestAnimationFrame(runChar);
}
runChar();

// Scroll background hills slowly
let hillOffset = 0;
function scrollBg(){
  hillOffset -= 0.3;
  document.querySelectorAll('.bg-hill').forEach((h,i)=>{
    const speed = i % 2 === 0 ? 0.4 : 0.25;
    const base  = i === 0 ? 15 : i === 1 ? 5 : 20;
    const x = ((base + hillOffset * speed) % 110) - 10;
    h.style.left = x + '%';
  });
  requestAnimationFrame(scrollBg);
}
scrollBg();

function showLine(text, onDone){
  if(!text || !text.trim()){setTimeout(onDone, 700); return;}

  lyricText.textContent = text;
  hitBlock();

  const hold = Math.max(1400, text.length * 65);
  gsap.timeline()
    .fromTo(lyricBox,
      {opacity:0, y:20, scale:0.9},
      {opacity:1, y:0,  scale:1, duration:0.15, ease:'back.out(1.5)'}
    )
    .to(lyricBox,
      {opacity:0, y:-15, scale:0.9, duration:0.12, ease:'power2.in', delay: hold/1000},
      '+=0'
    )
    .call(onDone);
}

function next(){
  if(idx >= LYRICS.length) return;
  showLine(LYRICS[idx++], next);
}

// Title screen → game start
gsap.delayedCall(0.5, ()=>{
  gsap.to(titleScr, {opacity:0, duration:0.4, delay:2.5,
    onComplete:()=>{
      titleScr.style.display='none';
      gsap.fromTo(hud,{opacity:0},{opacity:1, duration:0.5});
      gsap.fromTo(charEl,{opacity:0},{opacity:1, duration:0.3});
      gsap.fromTo(lyricBox,{opacity:0},{opacity:0}); // starts hidden
      setTimeout(next, 400);
    }
  });
});
</script>
</body>
</html>
